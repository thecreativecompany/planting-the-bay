<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Pop-Up Services placeholder</title>
  <desc id="desc">Stylized Bay Area community gathering in a flexible worship space with warm campaign colors.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
